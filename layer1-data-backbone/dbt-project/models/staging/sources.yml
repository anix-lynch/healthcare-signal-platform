version: 2

sources:
  - name: healthcare
    schema: dbo
    tables:
      - name: raw_healthcare_data
        identifier: raw_healthcare_data
        description: >
          Source table backing both the original 15-column registry and the
          497-row enriched subset (synthetic clinical narrative + vitals + labs
          + ESI ground-truth tags). Enriched columns are NULL for the 55,003
          non-enriched rows. Source CSV: data/raw/healthcare_dataset_enriched.csv
          (regenerated by scripts/enrich_parallel.py).
        columns:
          # Original 15 columns
          - {name: Name, description: "patient display name (PII — hashed downstream)"}
          - {name: Age, description: "patient age in years"}
          - {name: Gender, description: "patient gender"}
          - {name: Blood Type, description: "ABO+Rh"}
          - {name: Medical Condition, description: "primary condition label"}
          - {name: Date of Admission}
          - {name: Doctor}
          - {name: Hospital}
          - {name: Insurance Provider}
          - {name: Billing Amount, description: "USD"}
          - {name: Room Number}
          - {name: Admission Type, description: "Emergency / Urgent / Elective"}
          - {name: Discharge Date}
          - {name: Medication}
          - {name: Test Results, description: "Normal / Abnormal / Inconclusive"}

          # Enriched columns (LLM-generated for 497 stratified rows; NULL elsewhere)
          - {name: chief_complaint, description: "lay-language CC, used by Rachel + Traffic Light + ESI"}
          - {name: hpi, description: "history of present illness narrative"}
          - {name: physician_note, description: "A&P style note, Mad Lib grounding target"}
          - {name: bp_systolic, description: "intake BP systolic mmHg"}
          - {name: bp_diastolic, description: "intake BP diastolic mmHg"}
          - {name: heart_rate, description: "intake HR bpm"}
          - {name: respiratory_rate, description: "intake RR /min"}
          - {name: temperature_f, description: "intake temperature °F"}
          - {name: spo2_pct, description: "intake SpO2 %"}
          - {name: lab_panel_json, description: "JSON-encoded lab panel: troponin / wbc / glucose / lactate"}
          - {name: lab_flags, description: "semicolon-joined flags: elevated_*, low_*, etc."}
          - {name: esi_tier_truth, description: "ESI 1-5 ground truth — NEVER used as a feature in classifier"}
          - {name: acuity_red_flags, description: "semicolon-joined hard-rule triggers"}
          - {name: case_type, description: "edge-case scenario label (sepsis_general, stemi_acute_mi, ...) — NULL for non-edge rows"}
          - {name: scenario_hint, description: "free-text scenario directive used during enrichment"}
          - {name: holdout, description: "TRUE for the 100 eval-only rows — never feed into retrieval index or training"}
